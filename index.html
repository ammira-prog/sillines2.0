<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle for Maiku</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#f7d9e6,#d8e9ff);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#startScreen{
text-align:center;
padding:30px;
}

#startScreen h1{
font-size:36px;
margin-bottom:10px;
}

#startScreen p{
font-size:22px;
line-height:1.5;
}

#startBtn{
margin-top:25px;
font-size:26px;
padding:16px 30px;
border:none;
border-radius:14px;
background:#ff8fb1;
color:white;
}

#game{
display:none;
position:relative;
width:90vw;
height:70vh;
max-width:600px;
}

.piece{
position:absolute;
border-radius:14px;
background-image:url("PUZZLE.png");
background-size:100% 100%;
touch-action:none;
}

#reward{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#reward img{
width:85vw;
max-width:420px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<div id="startScreen">

<h1>hi maiku</h1>

<p>
since you made me hunt for eggs<br>
now it's your turn<br><br>

solve the puzzle<br>
to unlock your reward
</p>

<button id="startBtn">start puzzle</button>

</div>

<div id="game"></div>

<div id="reward">
<img src="REWARD_MESSAGE.png">
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_44b6d8d51c.mp3?filename=spring-in-my-step-109081.mp3">
</audio>

<audio id="snap">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8d8d83d01a.mp3?filename=click-124467.mp3">
</audio>

<script>

const rows=3
const cols=4

let board=document.getElementById("game")
let placed=0

document.getElementById("startBtn").onclick=startGame

function startGame(){

document.getElementById("startScreen").style.display="none"
board.style.display="block"

document.getElementById("music").volume=0.3
document.getElementById("music").play()

createPieces()

}

function createPieces(){

let boardRect=board.getBoundingClientRect()

let pieceW=boardRect.width/cols
let pieceH=boardRect.height/rows

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let piece=document.createElement("div")
piece.className="piece"

piece.style.width=pieceW+"px"
piece.style.height=pieceH+"px"

piece.style.backgroundImage="url('PUZZLE.png')"
piece.style.backgroundSize=boardRect.width+"px "+boardRect.height+"px"
piece.style.backgroundPosition=(-c*pieceW)+"px "+(-r*pieceH)+"px"

piece.correctX=c*pieceW
piece.correctY=r*pieceH

piece.style.left=(Math.random()*boardRect.width)+"px"
piece.style.top=(Math.random()*boardRect.height)+"px"

enableDrag(piece)

board.appendChild(piece)

}
}

}

function enableDrag(piece){

let offsetX,offsetY

piece.addEventListener("touchstart",e=>{

let touch=e.touches[0]

offsetX=touch.clientX-piece.offsetLeft
offsetY=touch.clientY-piece.offsetTop

})

piece.addEventListener("touchmove",e=>{

e.preventDefault()

let touch=e.touches[0]

piece.style.left=(touch.clientX-offsetX)+"px"
piece.style.top=(touch.clientY-offsetY)+"px"

})

piece.addEventListener("touchend",()=>{

checkSnap(piece)

})

}

function checkSnap(piece){

let dx=Math.abs(parseFloat(piece.style.left)-piece.correctX)
let dy=Math.abs(parseFloat(piece.style.top)-piece.correctY)

if(dx<30 && dy<30){

piece.style.left=piece.correctX+"px"
piece.style.top=piece.correctY+"px"

piece.style.transform="scale(1.05)"
setTimeout(()=>piece.style.transform="scale(1)",100)

document.getElementById("snap").play()

piece.style.pointerEvents="none"

placed++

if(placed===rows*cols){

setTimeout(showReward,600)

}

}

}

function showReward(){

board.style.display="none"
document.getElementById("reward").style.display="block"

}

</script>

</body>
  </html>
