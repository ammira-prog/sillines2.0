<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle for Maiku</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#f7d9e6,#d8e9ff);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* START SCREEN */

#startScreen{
text-align:center;
padding:30px;
}

#startScreen h1{
font-size:40px;
margin-bottom:10px;
}

#startScreen p{
font-size:24px;
line-height:1.6;
}

#startBtn{
margin-top:30px;
font-size:28px;
padding:18px 36px;
border:none;
border-radius:16px;
background:#ff8fb1;
color:white;
cursor:pointer;
}

/* PUZZLE BOARD */

#game{
display:none;
position:relative;
width:90vw;
height:70vh;
max-width:600px;
border-radius:20px;
overflow:hidden;
border:6px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

/* faint puzzle guide */
background-image:url("PUZZLE.png");
background-size:100% 100%;
opacity:0.95;
}

/* PUZZLE PIECES */

.piece{
position:absolute;
border-radius:16px;
background-image:url("PUZZLE.png");
touch-action:none;
z-index:5;
}

/* REWARD SCREEN */

#reward{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#reward img{
width:85vw;
max-width:420px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<div id="startScreen">

<h1>hi maiku</h1>

<p>
since you made me hunt for eggs<br>
now it's your turn<br><br>

solve the puzzle<br>
to unlock your reward
</p>

<button id="startBtn">start puzzle</button>

</div>

<div id="game"></div>

<div id="reward">
<img src="REWARD_MESSAGE.png">
</div>

<audio id="music" loop preload="auto">
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="snap" preload="auto">
<source src="snap.mp3" type="audio/mpeg">
</audio>

<script>

const rows = 3
const cols = 4

let board = document.getElementById("game")
let placed = 0

let music = document.getElementById("music")
let snap = document.getElementById("snap")

document.getElementById("startBtn").onclick = startGame

function startGame(){

document.getElementById("startScreen").style.display = "none"
board.style.display = "block"

music.volume = 0.25
music.play().catch(()=>{})

createPieces()

}

function createPieces(){

let rect = board.getBoundingClientRect()

let pieceW = rect.width / cols
let pieceH = rect.height / rows

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let piece = document.createElement("div")
piece.className = "piece"

piece.style.width = pieceW + "px"
piece.style.height = pieceH + "px"

piece.style.backgroundSize = rect.width + "px " + rect.height + "px"
piece.style.backgroundPosition = (-c * pieceW) + "px " + (-r * pieceH) + "px"

piece.correctX = c * pieceW
piece.correctY = r * pieceH

piece.style.left = Math.random() * rect.width + "px"
piece.style.top = Math.random() * rect.height + "px"

enableDrag(piece)

board.appendChild(piece)

}
}

}

function enableDrag(piece){

let offsetX, offsetY

piece.addEventListener("touchstart",e=>{

let touch = e.touches[0]

offsetX = touch.clientX - piece.offsetLeft
offsetY = touch.clientY - piece.offsetTop

})

piece.addEventListener("touchmove",e=>{

e.preventDefault()

let touch = e.touches[0]

piece.style.left = (touch.clientX - offsetX) + "px"
piece.style.top = (touch.clientY - offsetY) + "px"

})

piece.addEventListener("touchend",()=>{

checkSnap(piece)

})

}

function checkSnap(piece){

let dx = Math.abs(parseFloat(piece.style.left) - piece.correctX)
let dy = Math.abs(parseFloat(piece.style.top) - piece.correctY)

if(dx < 40 && dy < 40){

piece.style.left = piece.correctX + "px"
piece.style.top = piece.correctY + "px"

piece.style.transform = "scale(1.08)"

setTimeout(()=>{
piece.style.transform = "scale(1)"
},120)

snap.currentTime = 0
snap.play()

piece.style.pointerEvents = "none"

placed++

if(placed === rows * cols){

setTimeout(showReward,700)

}

}

}

function showReward(){

board.style.display = "none"
document.getElementById("reward").style.display = "block"

}

</script>

</body>
  </html>
